openapi: 3.1.0
info:
  title: Backend API
  description: |
    HTTP-API für das React-Frontend. Authentifizierung mit Laravel Sanctum **Personal Access Token**:
    nach `POST /login` den `token` speichern und bei geschützten Routen als Header
    `Authorization: Bearer <token>` mitsenden.

    Diese Datei ist **manuell** an die Implementierung anzupassen, wenn sich Routen oder Payloads ändern.
  version: 1.0.0

servers:
  - url: http://localhost:8000/api
    description: Lokaler Laravel-Server (php artisan serve)
  - url: '{scheme}://{host}/api'
    description: Konfigurierbar
    variables:
      scheme:
        default: https
      host:
        default: api.example.com

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Addresses
  - name: BankAccounts
  - name: Properties
  - name: RentalAgreements
  - name: Documents
  - name: Payments

paths:
  /ping:
    get:
      tags: [Health]
      summary: Erreichbarkeit der API
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: API läuft

  /login:
    post:
      tags: [Auth]
      summary: Login (Sanctum-Token ausstellen)
      description: |
        Rate-limited via `throttle:login`.
        Die Limits sind konfigurierbar über:
        `AUTH_LOGIN_MAX_ATTEMPTS` und `AUTH_LOGIN_DECAY_MINUTES`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Erfolg
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Ungültige Anmeldedaten oder Validierungsfehler
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/InvalidCredentialsError'
              examples:
                badCredentials:
                  value:
                    message: Die Anmeldedaten sind ungültig.
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /logout:
    post:
      tags: [Auth]
      summary: Aktuellen Token widerrufen
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: Erfolg
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: Logout erfolgreich.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user:
    get:
      tags: [Users]
      summary: Aktuell authentifizierter Benutzer (Profil)
      description: |
        Lädt die `roles`-Relation; im JSON ist `data.roles` daher **immer** ein Array
        (Rollennamen als Strings, ggf. leer).
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users:
    get:
      tags: [Users]
      summary: Benutzerliste (paginiert, Berechtigung erforderlich)
      security:
        - sanctumBearer: []
      parameters:
        - $ref: '#/components/parameters/FilterName'
        - $ref: '#/components/parameters/FilterEmail'
        - $ref: '#/components/parameters/FilterPhoneNumber'
        - $ref: '#/components/parameters/FilterOrganizationId'
        - $ref: '#/components/parameters/FilterRole'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Direction'
      responses:
        '200':
          description: Paginierte Liste
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPaginator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      summary: Benutzer anlegen
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreUserRequest'
      responses:
        '201':
          description: Angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /users/{user}:
    parameters:
      - name: user
        in: path
        required: true
        description: Benutzer-ID
        schema:
          type: integer
          example: 1
    get:
      tags: [Users]
      summary: Einzelnen Benutzer abrufen
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Benutzer aktualisieren (PUT, vollständige Ersetzung nicht erzwungen — wie PATCH genutzt)
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    patch:
      tags: [Users]
      summary: Benutzer teilweise aktualisieren
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags: [Users]
      summary: Benutzer löschen (nicht sich selbst)
      security:
        - sanctumBearer: []
      responses:
        '204':
          description: Kein Inhalt
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /addresses:
    get:
      tags: [Addresses]
      summary: Adressliste (paginiert)
      description: |
        `admin` sieht alle Adressen.
        `landlord` sieht nur Adressen von Objekten, bei denen er als `landlord`
        zugeordnet ist.
        `tenant` und `user` haben keinen Zugriff.
      security:
        - sanctumBearer: []
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/AddressCity'
        - $ref: '#/components/parameters/AddressCountry'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressPaginator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    post:
      tags: [Addresses]
      summary: Adresse anlegen
      description: |
        Nur für `admin` oder `landlord`.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreAddressRequest'
      responses:
        '201':
          description: Angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /addresses/{address}:
    parameters:
      - name: address
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Addresses]
      summary: Adresse anzeigen
      description: |
        `admin` darf jede Adresse sehen.
        `landlord` nur Adressen eigener Objekte.
        `tenant` und `user` haben keinen Zugriff.
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Addresses]
      summary: Adresse aktualisieren
      description: |
        Entspricht derselben Update-Logik wie `PATCH /addresses/{address}`.
        Nur für `admin` oder `landlord` bei eigenen Objekt-Adressen.
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    patch:
      tags: [Addresses]
      summary: Adresse aktualisieren
      description: |
        Nur für `admin` oder `landlord` bei eigenen Objekt-Adressen.
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags: [Addresses]
      summary: Adresse löschen
      description: |
        Nur für `admin` oder `landlord` bei eigenen Objekt-Adressen.
      security:
        - sanctumBearer: []
      responses:
        '204':
          description: Kein Inhalt
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /bank-accounts:
    get:
      tags: [BankAccounts]
      summary: Bankkonten / Zahlungsempfaenger listen
      description: |
        `admin` sieht alle Bankkonten.
        `landlord` sieht Bankkonten, die ihm selbst oder seiner Organisation
        zugeordnet sind.
        `tenant` und `user` haben keinen Zugriff auf die Bankkonto-Verwaltung.
      security:
        - sanctumBearer: []
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: integer
        - name: organization_id
          in: query
          required: false
          schema:
            type: integer
        - name: is_default
          in: query
          required: false
          schema:
            type: boolean
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountPaginator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    post:
      tags: [BankAccounts]
      summary: Bankkonto / Zahlungsempfaenger anlegen
      description: |
        Erstellt ein Bankkonto fuer einen Benutzer oder eine Organisation.
        Genau eines von `user_id` oder `organization_id` muss gesetzt sein.
        `landlord` darf nur eigene Bankkonten oder Konten der eigenen
        Organisation anlegen. `admin` darf alle Bankkonten anlegen.

        Wenn `is_default=true` gesetzt wird, werden andere Default-Konten
        desselben Besitzers automatisch deaktiviert.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreBankAccountRequest'
      responses:
        '201':
          description: Angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/BankAccount'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /bank-accounts/{bank_account}:
    parameters:
      - name: bank_account
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [BankAccounts]
      summary: Bankkonto anzeigen
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/BankAccount'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [BankAccounts]
      summary: Bankkonto ersetzen
      description: Entspricht fachlich derselben Update-Logik wie `PATCH`.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBankAccountRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/BankAccount'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    patch:
      tags: [BankAccounts]
      summary: Bankkonto aktualisieren
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBankAccountRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/BankAccount'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags: [BankAccounts]
      summary: Bankkonto loeschen
      description: |
        Loescht ein Bankkonto. Mietvertraege, die dieses Konto referenzieren,
        behalten ihre Dokument-Snapshots, die Live-Relation wird aber auf `null`
        gesetzt.
      security:
        - sanctumBearer: []
      responses:
        '204':
          description: Kein Inhalt
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /properties:
    get:
      tags: [Properties]
      summary: Objektliste (paginiert)
      description: |
        Nur für Benutzer mit Zugriff auf Objektfunktionen.
        Aktuell erlaubt für `admin`, `landlord` und `tenant`.
      security:
        - sanctumBearer: []
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/PropertyStatus'
        - $ref: '#/components/parameters/PropertyType'
        - $ref: '#/components/parameters/PropertyAddressId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyPaginator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    post:
      tags: [Properties]
      summary: Objekt anlegen
      description: |
        Aktuell nur für `admin` oder `landlord`.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorePropertyRequest'
      responses:
        '201':
          description: Angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Property'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /properties/{property}:
    parameters:
      - name: property
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Properties]
      summary: Objekt anzeigen
      description: |
        `admin` darf jedes Objekt sehen.
        `landlord` und `tenant` nur Objekte, bei denen sie über `property_user`
        passend zugeordnet sind.
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Property'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Properties]
      summary: Objekt aktualisieren
      description: |
        Entspricht derselben Update-Logik wie `PATCH /properties/{property}`.
        Aktuell nur für `admin` oder den als `landlord` zugeordneten
        Objektbesitzer.
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePropertyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Property'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    patch:
      tags: [Properties]
      summary: Objekt aktualisieren
      description: |
        Aktuell nur für `admin` oder den als `landlord` zugeordneten
        Objektbesitzer.
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePropertyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Property'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags: [Properties]
      summary: Objekt löschen
      description: |
        Aktuell nur für `admin` oder den als `landlord` zugeordneten
        Objektbesitzer.
      security:
        - sanctumBearer: []
      responses:
        '204':
          description: Kein Inhalt
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /properties/{property}/members:
    put:
      tags: [Properties]
      summary: Property-Mitglieder inkl. Rolle synchronisieren
      description: |
        Aktuell nur für `admin` oder den als `landlord` zugeordneten
        Objektbesitzer.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPropertyMembersRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Property'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /rental-agreements:
    get:
      tags: [RentalAgreements]
      summary: Mietvertragsliste (paginiert)
      description: |
        `admin` sieht alle Mietverträge.
        `landlord` sieht nur Mietverträge, bei denen er `landlord_id` ist.
        `tenant` sieht nur Mietverträge, bei denen er `tenant_id` ist.
        `user` hat keinen Zugriff.
      security:
        - sanctumBearer: []
      parameters:
