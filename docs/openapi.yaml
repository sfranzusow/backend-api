          type: boolean
        create_payment:
          type: boolean

    StoreRentalAgreementRequest:
      type: object
      description: |
        Neue Mietverträge starten immer als `draft`.
        Für `landlord` muss `landlord_id` die eigene Benutzer-ID sein und
        `property_id` ein selbst verwaltetes Objekt referenzieren.
      required: [property_id, landlord_id, tenant_id, date_from, rent_cold]
      properties:
        property_id:
          type: integer
          description: Für `landlord` nur selbst verwaltete Objekte.
        landlord_id:
          type: integer
          description: Für `landlord` muss dies die eigene Benutzer-ID sein.
        tenant_id:
          type: integer
        bank_account_id:
          type: integer
          nullable: true
          description: Muss zum Vermieter oder dessen Organisation gehoeren.
        date_from:
          type: string
          format: date
        date_to:
          type: string
          format: date
          nullable: true
        rent_cold:
          type: number
        rent_warm:
          type: number
          nullable: true
        service_charges:
          type: number
          nullable: true
        deposit:
          type: number
          nullable: true
        currency:
          type: string
          minLength: 3
          maxLength: 3
        status:
          type: string
          enum: [draft]
          default: draft
        notes:
          type: string

    UpdateRentalAgreementRequest:
      type: object
      description: |
        Statuswechsel sind eingeschränkt:
        `draft` -> `draft`/`active`,
        `active` -> `active`/`terminated`/`ended`,
        `terminated` -> `terminated`,
        `ended` -> `ended`.

        Für `landlord` darf `landlord_id` nicht auf einen anderen Benutzer
        geändert werden und `property_id` nur auf ein selbst verwaltetes Objekt.
      properties:
        property_id:
          type: integer
          description: Für `landlord` nur selbst verwaltete Objekte.
        landlord_id:
          type: integer
          description: Für `landlord` muss dies die eigene Benutzer-ID bleiben.
        tenant_id:
          type: integer
        bank_account_id:
          type: integer
          nullable: true
          description: Muss zum effektiven Vermieter oder dessen Organisation gehoeren.
        date_from:
          type: string
          format: date
        date_to:
          type: string
          format: date
          nullable: true
        rent_cold:
          type: number
        rent_warm:
          type: number
          nullable: true
        service_charges:
          type: number
          nullable: true
        deposit:
          type: number
          nullable: true
        currency:
          type: string
          minLength: 3
          maxLength: 3
        status:
          type: string
          enum: [draft, active, terminated, ended]
          description: |
            Erlaubte Übergänge:
            `draft` -> `draft`/`active`,
            `active` -> `active`/`terminated`/`ended`,
            `terminated` -> `terminated`,
            `ended` -> `ended`.
        notes:
          type: string

