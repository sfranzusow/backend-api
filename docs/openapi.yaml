openapi: 3.1.0
info:
  title: Backend API
  description: |
    HTTP-API für das React-Frontend. Authentifizierung mit Laravel Sanctum **Personal Access Token**:
    nach `POST /login` den `token` speichern und bei geschützten Routen als Header
    `Authorization: Bearer <token>` mitsenden.

    Diese Datei ist **manuell** an die Implementierung anzupassen, wenn sich Routen oder Payloads ändern.
  version: 1.0.0

servers:
  - url: http://localhost:8000/api
    description: Lokaler Laravel-Server (php artisan serve)
  - url: '{scheme}://{host}/api'
    description: Konfigurierbar
    variables:
      scheme:
        default: https
      host:
        default: api.example.com

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Addresses
  - name: Properties
  - name: RentalAgreements

paths:
  /ping:
    get:
      tags: [Health]
      summary: Erreichbarkeit der API
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: API läuft

  /login:
    post:
      tags: [Auth]
      summary: Login (Sanctum-Token ausstellen)
      description: |
        Rate-limited via `throttle:login`.
        Die Limits sind konfigurierbar über:
        `AUTH_LOGIN_MAX_ATTEMPTS` und `AUTH_LOGIN_DECAY_MINUTES`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Erfolg
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Ungültige Anmeldedaten oder Validierungsfehler
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationError'
                  - $ref: '#/components/schemas/InvalidCredentialsError'
              examples:
                badCredentials:
                  value:
                    message: Die Anmeldedaten sind ungültig.
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /logout:
    post:
      tags: [Auth]
      summary: Aktuellen Token widerrufen
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: Erfolg
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: Logout erfolgreich.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user:
    get:
      tags: [Users]
      summary: Aktuell authentifizierter Benutzer (Profil)
      description: |
        Lädt die `roles`-Relation; im JSON ist `data.roles` daher **immer** ein Array
        (Rollennamen als Strings, ggf. leer).
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users:
    get:
      tags: [Users]
      summary: Benutzerliste (paginiert, Berechtigung erforderlich)
      security:
        - sanctumBearer: []
      parameters:
        - $ref: '#/components/parameters/FilterName'
        - $ref: '#/components/parameters/FilterEmail'
        - $ref: '#/components/parameters/FilterRole'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Direction'
      responses:
        '200':
          description: Paginierte Liste
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPaginator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      summary: Benutzer anlegen
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreUserRequest'
      responses:
        '201':
          description: Angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /users/{user}:
    parameters:
      - name: user
        in: path
        required: true
        description: Benutzer-ID
        schema:
          type: integer
          example: 1
    get:
      tags: [Users]
      summary: Einzelnen Benutzer abrufen
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Benutzer aktualisieren (PUT, vollständige Ersetzung nicht erzwungen — wie PATCH genutzt)
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    patch:
      tags: [Users]
      summary: Benutzer teilweise aktualisieren
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags: [Users]
      summary: Benutzer löschen (nicht sich selbst)
      security:
        - sanctumBearer: []
      responses:
        '204':
          description: Kein Inhalt
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /addresses:
    get:
      tags: [Addresses]
      summary: Adressliste (paginiert)
      description: Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/AddressCity'
        - $ref: '#/components/parameters/AddressCountry'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressPaginator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    post:
      tags: [Addresses]
      summary: Adresse anlegen
      description: Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreAddressRequest'
      responses:
        '201':
          description: Angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /addresses/{address}:
    parameters:
      - name: address
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Addresses]
      summary: Adresse anzeigen
      description: Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Addresses]
      summary: Adresse aktualisieren
      description: |
        Entspricht derselben Update-Logik wie `PATCH /addresses/{address}`.
        Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    patch:
      tags: [Addresses]
      summary: Adresse aktualisieren
      description: Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags: [Addresses]
      summary: Adresse löschen
      description: Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      responses:
        '204':
          description: Kein Inhalt
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /properties:
    get:
      tags: [Properties]
      summary: Objektliste (paginiert)
      description: |
        Nur für Benutzer mit Zugriff auf Objektfunktionen.
        Aktuell erlaubt für `admin`, `landlord` und `tenant`.
      security:
        - sanctumBearer: []
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/PropertyStatus'
        - $ref: '#/components/parameters/PropertyType'
        - $ref: '#/components/parameters/PropertyAddressId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyPaginator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    post:
      tags: [Properties]
      summary: Objekt anlegen
      description: |
        Aktuell nur für `admin` oder `landlord`.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorePropertyRequest'
      responses:
        '201':
          description: Angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Property'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /properties/{property}:
    parameters:
      - name: property
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Properties]
      summary: Objekt anzeigen
      description: |
        `admin` darf jedes Objekt sehen.
        `landlord` und `tenant` nur Objekte, bei denen sie über `property_user`
        passend zugeordnet sind.
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Property'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Properties]
      summary: Objekt aktualisieren
      description: |
        Entspricht derselben Update-Logik wie `PATCH /properties/{property}`.
        Aktuell nur für `admin` oder den als `landlord` zugeordneten
        Objektbesitzer.
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePropertyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Property'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    patch:
      tags: [Properties]
      summary: Objekt aktualisieren
      description: |
        Aktuell nur für `admin` oder den als `landlord` zugeordneten
        Objektbesitzer.
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePropertyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Property'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags: [Properties]
      summary: Objekt löschen
      description: |
        Aktuell nur für `admin` oder den als `landlord` zugeordneten
        Objektbesitzer.
      security:
        - sanctumBearer: []
      responses:
        '204':
          description: Kein Inhalt
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /properties/{property}/members:
    put:
      tags: [Properties]
      summary: Property-Mitglieder inkl. Rolle synchronisieren
      description: |
        Aktuell nur für `admin` oder den als `landlord` zugeordneten
        Objektbesitzer.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPropertyMembersRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Property'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /rental-agreements:
    get:
      tags: [RentalAgreements]
      summary: Mietvertragsliste (paginiert)
      description: Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/RentalAgreementStatus'
        - $ref: '#/components/parameters/RentalAgreementPropertyId'
        - $ref: '#/components/parameters/RentalAgreementLandlordId'
        - $ref: '#/components/parameters/RentalAgreementTenantId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalAgreementPaginator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    post:
      tags: [RentalAgreements]
      summary: Mietvertrag anlegen
      description: Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreRentalAgreementRequest'
      responses:
        '201':
          description: Angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/RentalAgreement'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /rental-agreements/{rentalAgreement}:
    parameters:
      - name: rentalAgreement
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [RentalAgreements]
      summary: Mietvertrag anzeigen
      description: Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/RentalAgreement'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [RentalAgreements]
      summary: Mietvertrag aktualisieren
      description: |
        Entspricht derselben Update-Logik wie `PATCH /rental-agreements/{rentalAgreement}`.
        Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRentalAgreementRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/RentalAgreement'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    patch:
      tags: [RentalAgreements]
      summary: Mietvertrag aktualisieren
      description: Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRentalAgreementRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/RentalAgreement'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags: [RentalAgreements]
      summary: Mietvertrag löschen
      description: Für jeden authentifizierten Benutzer verfügbar.
      security:
        - sanctumBearer: []
      responses:
        '204':
          description: Kein Inhalt
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    sanctumBearer:
      type: http
      scheme: bearer
      bearerFormat: Sanctum Personal Access Token
      description: Wert aus `POST /login` → Feld `token`

  parameters:
    FilterName:
      name: name
      in: query
      schema:
        type: string
      description: Teilstring-Filter (LIKE)
    FilterEmail:
      name: email
      in: query
      schema:
        type: string
    FilterRole:
      name: role
      in: query
      schema:
        type: string
      description: Rollenname (`roles.name`, z. B. admin, user, landlord, tenant)
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 15
    Sort:
      name: sort
      in: query
      schema:
        type: string
        enum: [id, name, email]
        default: id
    Direction:
      name: direction
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    AddressCity:
      name: city
      in: query
      schema:
        type: string
        maxLength: 255
      description: Teilstring-Filter auf `addresses.city` (LIKE)
    AddressCountry:
      name: country
      in: query
      schema:
        type: string
        minLength: 2
        maxLength: 2
      description: ISO-2-Ländercode; im Backend zu Uppercase normalisiert
    PropertyStatus:
      name: status
      in: query
      schema:
        type: string
        enum: [available, rented, sold]
    PropertyType:
      name: type
      in: query
      schema:
        type: string
        enum: [apartment, office, penthouse, studio]
    PropertyAddressId:
      name: address_id
      in: query
      schema:
        type: integer
    RentalAgreementStatus:
      name: status
      in: query
      schema:
        type: string
        enum: [draft, active, terminated, ended]
    RentalAgreementPropertyId:
      name: property_id
      in: query
      schema:
        type: integer
    RentalAgreementLandlordId:
      name: landlord_id
      in: query
      schema:
        type: integer
    RentalAgreementTenantId:
      name: tenant_id
      in: query
      schema:
        type: integer

  responses:
    Unauthorized:
      description: Nicht authentifiziert (fehlender/ungültiger Token)
    Forbidden:
      description: Authentifiziert, aber keine Berechtigung
    NotFound:
      description: Ressource nicht gefunden
    TooManyRequests:
      description: Zu viele Anfragen in kurzer Zeit (Rate Limit)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TooManyRequestsError'
          examples:
            throttledLogin:
              value:
                message: Too many attempts. Please try again in 60 seconds.

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required: [message, token, user]
      properties:
        message:
          type: string
          example: Login erfolgreich.
        token:
          type: string
          description: Plain-Text-Token für Authorization-Header
        user:
          $ref: '#/components/schemas/UserWithoutRoles'

    InvalidCredentialsError:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Die Anmeldedaten sind ungültig.

    UserWithoutRoles:
      type: object
      description: UserResource ohne geladene roles-Relation (z. B. Login)
      required: [id, name, email, created_at, updated_at]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    User:
      type: object
      description: |
        UserResource. Feld `roles` erscheint, wenn die Relation geladen ist
        (`GET /user`, `GET/PUT/PATCH` einzelner User, Listeneinträge). Beim **Login**
        (`user` in LoginResponse) wird `roles` nicht geladen und fehlt im JSON.
      required: [id, name, email, created_at, updated_at]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        roles:
          type: array
          items:
            type: string
          description: Rollennamen (z. B. admin, user), wenn mitgeladen

    StoreUserRequest:
      type: object
      description: |
        Ohne Feld `roles` weist das Backend automatisch die Rolle `user` zu.
        Mit `roles` werden die angegebenen Spatie-Rollennamen gesetzt (`syncRoles`);
        dafür ist die Berechtigung `assignRoles` nötig.
      required: [name, email, password, password_confirmation]
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
        roles:
          type: array
          items:
            type: string
          description: Optional; existierende `roles.name`; erfordert Zuweisungsrecht

    UpdateUserRequest:
      type: object
      description: |
        Alle Felder optional. Bei **Passwortänderung für den eigenen Account** zusätzlich
        `current_password` (aktuelles Passwort) mitsenden. Admins können fremde Passwörter
        ohne `current_password` setzen.
        Feld `roles` setzt Rollen per `syncRoles` (leeres Array entfernt alle Rollen);
        nur mit Berechtigung `assignRoles`, eigene Rollen nicht per API änderbar.
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
        current_password:
          type: string
          description: Erforderlich wenn authentifizierter User sich selbst aktualisiert und `password` gesetzt ist
        roles:
          type: array
          items:
            type: string

    UserPaginator:
      type: object
      description: Laravel paginierte Resource-Collection (data + links + meta)
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        links:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true

    Address:
      type: object
      required: [id, street, house_number, zip_code, city, country, created_at, updated_at]
      properties:
        id:
          type: integer
        street:
          type: string
        house_number:
          type: string
        zip_code:
          type: string
        city:
          type: string
        country:
          type: string
          default: DE
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreAddressRequest:
      type: object
      required: [street, house_number, zip_code, city]
      properties:
        street:
          type: string
          maxLength: 255
        house_number:
          type: string
          maxLength: 20
        zip_code:
          type: string
          maxLength: 20
        city:
          type: string
          maxLength: 255
        country:
          type: string
          minLength: 2
          maxLength: 2
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180

    UpdateAddressRequest:
      type: object
      properties:
        street:
          type: string
          maxLength: 255
        house_number:
          type: string
          maxLength: 20
        zip_code:
          type: string
          maxLength: 20
        city:
          type: string
          maxLength: 255
        country:
          type: string
          minLength: 2
          maxLength: 2
        latitude:
          type: number
          nullable: true
          minimum: -90
          maximum: 90
        longitude:
          type: number
          nullable: true
          minimum: -180
          maximum: 180

    AddressPaginator:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        links:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true

    Property:
      type: object
      required: [id, address_id, type, area_living, rooms, status, created_at, updated_at]
      properties:
        id:
          type: integer
        address_id:
          type: integer
        unit_number:
          type: string
          nullable: true
        type:
          type: string
          enum: [apartment, office, penthouse, studio]
        status:
          type: string
          enum: [available, rented, sold]
          default: available
        area_living:
          type: string
        rooms:
          type: integer
        floor:
          type: integer
          nullable: true
        build_year:
          type: integer
          nullable: true
        energy_class:
          type: string
          nullable: true
        price:
          type: string
          nullable: true
        features:
          type: array
          nullable: true
          items:
            type: string
        address:
          $ref: '#/components/schemas/Address'
        members:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/PropertyMember'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StorePropertyRequest:
      type: object
      required: [address_id, type, area_living, rooms]
      properties:
        address_id:
          type: integer
        unit_number:
          type: string
          maxLength: 255
        type:
          type: string
          enum: [apartment, office, penthouse, studio]
        area_living:
          type: number
        rooms:
          type: integer
        floor:
          type: integer
        build_year:
          type: integer
          minimum: 1800
        energy_class:
          type: string
          maxLength: 3
        price:
          type: number
        features:
          type: array
          nullable: true
          items:
            type: string
        status:
          type: string
          enum: [available, rented, sold]

    UpdatePropertyRequest:
      type: object
      properties:
        address_id:
          type: integer
        unit_number:
          type: string
          nullable: true
          maxLength: 255
        type:
          type: string
          enum: [apartment, office, penthouse, studio]
        area_living:
          type: number
        rooms:
          type: integer
        floor:
          type: integer
        build_year:
          type: integer
          nullable: true
          minimum: 1800
        energy_class:
          type: string
          nullable: true
          maxLength: 3
        price:
          type: number
          nullable: true
        features:
          type: array
          nullable: true
          items:
            type: string
        status:
          type: string
          enum: [available, rented, sold]

    PropertyMember:
      type: object
      required: [user, role, start_date, end_date]
      properties:
        user:
          $ref: '#/components/schemas/UserWithoutRoles'
        role:
          type: string
          enum: [landlord, tenant, manager]
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true

    SyncPropertyMembersRequest:
      type: object
      required: [members]
      properties:
        members:
          type: array
          items:
            type: object
            required: [user_id, role]
            properties:
              user_id:
                type: integer
              role:
                type: string
                enum: [landlord, tenant, manager]
              start_date:
                type: string
                format: date
                nullable: true
              end_date:
                type: string
                format: date
                nullable: true

    PropertyPaginator:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Property'
        links:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true

    RentalAgreement:
