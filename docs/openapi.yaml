      summary: Dokumentvorlage anlegen
      description: |
        Erstellt eine neue Dokumentvorlage. Aktuell nur fuer `admin`.

        Wenn `placeholders` nicht uebergeben wird, extrahiert der Server die
        Platzhalter aus `content`. Unbekannte Platzhalter werden abgelehnt.

        Wenn `status=active` uebergeben wird, wird die neue Vorlage nach dem
        Anlegen aktiviert. Dabei werden andere aktive Vorlagen derselben
        Kombination aus `document_type`, `template_type` und `locale` archiviert.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
