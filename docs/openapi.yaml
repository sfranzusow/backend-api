  /document-templates:
    get:
      tags: [Documents]
      summary: Dokumentvorlagen listen
      description: |
        Listet Dokumentvorlagen fuer die Dokumenterzeugung.

        `admin` sieht alle Vorlagen und kann nach `status` filtern.
        `landlord` sieht nur aktive Vorlagen (`status=active`), unabhaengig
        vom uebergebenen Statusfilter. `tenant` und `user` haben keinen Zugriff.

        Das Frontend sollte diese Liste fuer die Vorlagenauswahl beim Anlegen
        einer Dokumentakte nutzen.
      security:
        - sanctumBearer: []
      parameters:
        - name: document_type
          in: query
          required: false
          schema:
            type: string
            enum: [rental_agreement_contract]
        - name: template_type
          in: query
          required: false
          schema:
            type: string
        - name: locale
          in: query
          required: false
          schema:
            type: string
            example: de-DE
        - name: status
          in: query
          required: false
          description: Nur fuer `admin` wirksam.
          schema:
            type: string
            enum: [draft, active, archived]
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTemplatePaginator'
        '401':
          $ref: '#/components/responses/Unauthorized'
