openapi: 3.1.0
info:
  title: Backend API
  description: |
    HTTP-API für das React-Frontend. Authentifizierung mit Laravel Sanctum **Personal Access Token**:
    nach `POST /login` den `token` speichern und bei geschützten Routen als Header
    `Authorization: Bearer <token>` mitsenden.

    Diese Datei ist **manuell** an die Implementierung anzupassen, wenn sich Routen oder Payloads ändern.
  version: 1.0.0

servers:
  - url: http://localhost:8000/api
    description: Lokaler Laravel-Server (php artisan serve)
  - url: '{scheme}://{host}/api'
    description: Konfigurierbar
    variables:
      scheme:
        default: https
      host:
        default: api.example.com

tags:
  - name: Health
  - name: Auth
  - name: Users

paths:
  /ping:
    get:
      tags: [Health]
      summary: Erreichbarkeit der API
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: API läuft

  /login:
    post:
      tags: [Auth]
      summary: Login (Sanctum-Token ausstellen)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Erfolg
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Ungültige Anmeldedaten oder Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              examples:
                badCredentials:
                  value:
                    message: Die Anmeldedaten sind ungültig.

  /logout:
    post:
      tags: [Auth]
      summary: Aktuellen Token widerrufen
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: Erfolg
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: Logout erfolgreich.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user:
    get:
      tags: [Users]
      summary: Aktuell authentifizierter Benutzer (Profil)
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users:
    get:
      tags: [Users]
      summary: Benutzerliste (paginiert, Berechtigung erforderlich)
      security:
        - sanctumBearer: []
      parameters:
        - $ref: '#/components/parameters/FilterName'
        - $ref: '#/components/parameters/FilterEmail'
        - $ref: '#/components/parameters/FilterRole'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Direction'
      responses:
        '200':
          description: Paginierte Liste
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPaginator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      summary: Benutzer anlegen
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreUserRequest'
      responses:
        '201':
          description: Angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /users/{user}:
    parameters:
      - name: user
        in: path
        required: true
        description: Benutzer-ID
        schema:
          type: integer
          example: 1
    get:
      tags: [Users]
      summary: Einzelnen Benutzer abrufen
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Benutzer aktualisieren (PUT, vollständige Ersetzung nicht erzwungen — wie PATCH genutzt)
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    patch:
      tags: [Users]
      summary: Benutzer teilweise aktualisieren
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags: [Users]
      summary: Benutzer löschen (nicht sich selbst)
      security:
        - sanctumBearer: []
      responses:
        '204':
          description: Kein Inhalt
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    sanctumBearer:
      type: http
      scheme: bearer
      bearerFormat: Sanctum Personal Access Token
      description: Wert aus `POST /login` → Feld `token`

  parameters:
    FilterName:
      name: name
      in: query
      schema:
        type: string
      description: Teilstring-Filter (LIKE)
    FilterEmail:
      name: email
      in: query
      schema:
        type: string
    FilterRole:
      name: role
      in: query
      schema:
        type: string
      description: Rollenname (Spalte `roles.name`, z. B. admin, user)
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 15
    Sort:
      name: sort
      in: query
      schema:
        type: string
        enum: [id, name, email]
        default: id
    Direction:
      name: direction
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  responses:
    Unauthorized:
      description: Nicht authentifiziert (fehlender/ungültiger Token)
    Forbidden:
      description: Authentifiziert, aber keine Berechtigung
    NotFound:
      description: Ressource nicht gefunden

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required: [message, token, user]
      properties:
        message:
          type: string
          example: Login erfolgreich.
        token:
          type: string
          description: Plain-Text-Token für Authorization-Header
        user:
          $ref: '#/components/schemas/UserWithoutRoles'

    UserWithoutRoles:
      type: object
      description: UserResource ohne geladene roles-Relation (z. B. Login)
      required: [id, name, email, created_at, updated_at]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    User:
      type: object
      description: UserResource; `roles` nur wenn Relation geladen
      required: [id, name, email, created_at, updated_at]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        roles:
          type: array
          items:
            type: string
          description: Rollennamen (z. B. admin, user), wenn mitgeladen

    StoreUserRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
        roles:
          type: array
          items:
            type: string
          description: Optional; existierende `roles.name`; erfordert Zuweisungsrecht

    UpdateUserRequest:
      type: object
      description: |
        Alle Felder optional. Bei **Passwortänderung für den eigenen Account** zusätzlich
        `current_password` (aktuelles Passwort) mitsenden. Admins können fremde Passwörter
        ohne `current_password` setzen.
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
        current_password:
          type: string
          description: Erforderlich wenn authentifizierter User sich selbst aktualisiert und `password` gesetzt ist
        roles:
          type: array
          items:
            type: string

    UserPaginator:
      type: object
      description: Laravel paginierte Resource-Collection (data + links + meta)
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        links:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true

    ValidationError:
      type: object
      description: Laravel Validierungsfehler (422)
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
