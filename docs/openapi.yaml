            schema:
              $ref: '#/components/schemas/StoreDocumentTemplateRequest'
      responses:
        '201':
          description: Vorlage angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/DocumentTemplate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /document-templates/{document_template}:
    parameters:
      - name: document_template
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Documents]
      summary: Dokumentvorlage anzeigen
      description: |
        Zeigt eine einzelne Dokumentvorlage.

