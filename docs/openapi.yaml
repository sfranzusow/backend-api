    parameters:
      - name: document
        in: path
        required: true
        schema:
          type: integer
    post:
      tags: [Documents]
      summary: Dokumentversion und PDF erzeugen
      description: |
        Erzeugt für ein Mietvertragsdokument eine neue `DocumentVersion` als Snapshot
        aus Vorlage, Mietvertragsdaten, Objekt, Vermieter und Mieter.
        Zusätzlich wird eine PDF-Datei gespeichert und als `DocumentFile`
        mit `file_type=generated_pdf` verknüpft.

        Erlaubt für `admin` oder den zugeordneten `landlord`, der das zugehörige
        Objekt als Vermieter verwaltet. `tenant` darf erst freigegebene PDFs
        herunterladen, aber keine neuen Versionen erzeugen.

        Ein bereits erzeugtes Dokument kann erneut erzeugt werden; die vorherige
        neueste Version wird dabei auf `void` gesetzt. Dokumente im Status
        `signed_uploaded` oder `void` können nicht erneut erzeugt werden.
      security:
        - sanctumBearer: []
      responses:
        '201':
          description: Version und PDF erzeugt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Document'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Keine aktive Vorlage, ungültiger Status oder nicht unterstützter Dokumentkontext
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /documents/{document}/share:
    parameters:
      - name: document
        in: path
        required: true
        schema:
          type: integer
    post:
      tags: [Documents]
      summary: Dokumentversion freigeben
      description: |
        Setzt ein erzeugtes Dokument und seine neueste Version von `generated`
        auf `shared`.

        Erlaubt für `admin` oder den zugeordneten `landlord`, der das zugehörige
        Objekt als Vermieter verwaltet. `tenant` darf freigegebene Dokumente
        sehen/herunterladen, aber nicht selbst freigeben.
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: Dokument freigegeben
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Document'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Keine erzeugte Version oder ungültiger Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /documents/{document}/void:
    parameters:
      - name: document
        in: path
        required: true
        schema:
          type: integer
    post:
      tags: [Documents]
      summary: Dokument verwerfen
      description: |
        Setzt ein Dokument auf `void`. Wenn eine neueste Dokumentversion
        vorhanden ist, wird auch diese Version auf `void` gesetzt.

        Ein verworfenes Dokument ist final: erzeugte PDFs und unterschriebene
        Uploads werden nicht mehr über die Download-Endpunkte ausgeliefert.
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: Dokument verworfen
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Document'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Ungültiger Statusübergang
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /documents/{document}/download:
    parameters:
      - name: document
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Documents]
      summary: Aktuell erzeugtes PDF herunterladen
      description: |
        Liefert die PDF-Datei der neuesten Dokumentversion zurück, sofern dort
        eine Datei mit `file_type=generated_pdf` vorhanden ist. Verworfene
        Versionen liefern `404`.

        Es gilt dieselbe Leseberechtigung wie bei `GET /documents/{document}`.
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: PDF-Datei
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /documents/{document}/signed-upload:
    parameters:
      - name: document
        in: path
        required: true
        schema:
          type: integer
    post:
      tags: [Documents]
      summary: Unterschriebene Dokumentdatei hochladen
      description: |
        Lädt eine unterschriebene Datei zur neuesten Dokumentversion hoch.
        Erlaubt sind PDF, JPG, JPEG und PNG bis 10 MB.

        Nach erfolgreichem Upload werden `Document.status` und
        `DocumentVersion.status` auf `signed_uploaded` gesetzt. Die Datei wird
        als `DocumentFile` mit `file_type=signed_upload` gespeichert.

        Uploads sind nur für Dokumente in `generated`, `shared` oder bereits
        `signed_uploaded` möglich. `void` ist final.

        `admin` und zugeordneter `landlord` dürfen im gültigen Workflow hochladen.
        `tenant` darf nur für eigene freigegebene Dokumente (`shared`) eine
        unterschriebene Datei hochladen.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StoreSignedDocumentUploadRequest'
      responses:
        '201':
          description: Unterschriebene Datei hochgeladen
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Document'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler oder keine vorhandene Dokumentversion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /documents/{document}/signed-download:
    parameters:
      - name: document
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Documents]
      summary: Aktuell hochgeladene unterschriebene Datei herunterladen
      description: |
        Liefert die neueste Datei mit `file_type=signed_upload` der neuesten
        Dokumentversion zurück.

        Es gilt dieselbe Leseberechtigung wie bei `GET /documents/{document}`.
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: Unterschriebene Datei
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /documents/{document}/reminders:
    parameters:
      - name: document
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Documents]
      summary: Fristen und Erinnerungen eines Dokuments auflisten
      description: |
        Listet Reminder zur Dokumentakte, z. B. fehlende Unterschrift oder
        Wiedervorlage. Es gilt dieselbe Leseberechtigung wie bei
        `GET /documents/{document}`.

        `tenant` erhält nur Reminder, die ihm selbst über `assigned_to_id`
        zugewiesen sind. Interne Vermieter-Wiedervorlagen bleiben verborgen.
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DocumentReminder'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Documents]
      summary: Frist oder Erinnerung für Dokument anlegen
      description: |
        Legt eine neue Erinnerung im Status `pending` an. Erlaubt für `admin`
        oder den zugeordneten `landlord`, der das zugehörige Objekt verwaltet.
        `tenant` darf Erinnerungen lesen, aber nicht anlegen.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreDocumentReminderRequest'
      responses:
        '201':
          description: Erinnerung angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/DocumentReminder'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /document-reminders/{documentReminder}:
    parameters:
      - name: documentReminder
        in: path
        required: true
        schema:
          type: integer
    patch:
      tags: [Documents]
      summary: Frist oder Erinnerung aktualisieren
      description: |
        Aktualisiert Titel, Notizen, Fälligkeit, Erinnerungszeit, Zuweisung,
        Metadaten oder Status. Beim Wechsel auf `done` setzt der Server
        `completed_at`, wenn kein eigener Wert übergeben wird.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentReminderRequest'
      responses:
        '200':
          description: Erinnerung aktualisiert
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/DocumentReminder'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags: [Documents]
      summary: Frist oder Erinnerung löschen
      security:
        - sanctumBearer: []
      responses:
        '204':
          description: Kein Inhalt
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    sanctumBearer:
      type: http
      scheme: bearer
      bearerFormat: Sanctum Personal Access Token
      description: Wert aus `POST /login` → Feld `token`

  parameters:
    FilterName:
      name: name
      in: query
      schema:
        type: string
      description: Teilstring-Filter (LIKE)
    FilterEmail:
      name: email
      in: query
      schema:
        type: string
    FilterPhoneNumber:
      name: phone_number
      in: query
      schema:
        type: string
      description: Teilstring-Filter auf Telefonnummer
    FilterOrganizationId:
      name: organization_id
      in: query
      schema:
        type: integer
      description: Filter auf Organisationszuordnung
    FilterRole:
      name: role
      in: query
      schema:
        type: string
      description: Rollenname (`roles.name`, z. B. admin, user, landlord, tenant)
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 15
    Sort:
      name: sort
      in: query
      schema:
        type: string
        enum: [id, name, email]
        default: id
    Direction:
      name: direction
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    AddressCity:
      name: city
      in: query
      schema:
        type: string
        maxLength: 255
      description: Teilstring-Filter auf `addresses.city` (LIKE)
    AddressCountry:
      name: country
      in: query
      schema:
        type: string
        minLength: 2
        maxLength: 2
      description: ISO-2-Ländercode; im Backend zu Uppercase normalisiert
    PropertyStatus:
      name: status
      in: query
      schema:
        type: string
        enum: [available, rented, sold]
    PropertyType:
      name: type
      in: query
      schema:
        type: string
        enum: [apartment, office, penthouse, studio]
    PropertyAddressId:
      name: address_id
      in: query
      schema:
        type: integer
    RentalAgreementStatus:
      name: status
      in: query
      schema:
        type: string
        enum: [draft, active, terminated, ended]
    RentalAgreementPropertyId:
      name: property_id
      in: query
      schema:
        type: integer
    RentalAgreementLandlordId:
      name: landlord_id
      in: query
      schema:
        type: integer
    RentalAgreementTenantId:
      name: tenant_id
      in: query
      schema:
        type: integer

  responses:
    Unauthorized:
      description: Nicht authentifiziert (fehlender/ungültiger Token)
    Forbidden:
      description: Authentifiziert, aber keine Berechtigung
    NotFound:
      description: Ressource nicht gefunden
    TooManyRequests:
      description: Zu viele Anfragen in kurzer Zeit (Rate Limit)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TooManyRequestsError'
          examples:
            throttledLogin:
              value:
                message: Too many attempts. Please try again in 60 seconds.

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required: [message, token, user]
      properties:
        message:
          type: string
          example: Login erfolgreich.
        token:
          type: string
          description: Plain-Text-Token für Authorization-Header
        user:
          $ref: '#/components/schemas/User'

    InvalidCredentialsError:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Die Anmeldedaten sind ungültig.

    Organization:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          nullable: true
          example: property_management
        email:
          type: string
          format: email
          nullable: true
        phone_number:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BankAccount:
      type: object
      description: |
        Zahlungsempfaenger / Bankkonto fuer Mietvertraege. Genau eines von
        `user_id` oder `organization_id` ist gesetzt. Mietvertraege koennen
        optional ein Bankkonto referenzieren; Dokumentversionen speichern die
        Bankdaten im Snapshot.
      required: [id, user_id, organization_id, account_holder, iban, is_default, created_at, updated_at]
      properties:
        id:
          type: integer
        user_id:
          type: integer
          nullable: true
        organization_id:
          type: integer
          nullable: true
        account_holder:
          type: string
          example: Erika Vermieter
        iban:
          type: string
          example: DE89370400440532013000
        bic:
          type: string
          nullable: true
          example: COBADEFFXXX
        bank_name:
          type: string
          nullable: true
          example: Musterbank
        is_default:
          type: boolean
          default: false
        user:
          allOf:
            - $ref: '#/components/schemas/User'
          nullable: true
        organization:
          allOf:
            - $ref: '#/components/schemas/Organization'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BankAccountPaginator:
      type: object
      description: Laravel paginierte Resource-Collection (data + links + meta)
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BankAccount'
        links:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true

    User:
      type: object
      description: |
        UserResource. Feld `roles` erscheint, wenn die Relation geladen ist.
        Feld `organization` erscheint, wenn die Relation geladen ist
        (`GET /user`, `GET/PUT/PATCH` einzelner User, Listeneinträge). Beim **Login**
        (`user` in LoginResponse) werden Relationen nicht geladen und fehlen im JSON.
      required: [id, name, email, phone_number, address_street, address_house_number, address_zip_code, address_city, address_country, organization_id, created_at, updated_at]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
          nullable: true
        address_street:
          type: string
          nullable: true
        address_house_number:
          type: string
          nullable: true
        address_zip_code:
          type: string
          nullable: true
        address_city:
          type: string
          nullable: true
        address_country:
          type: string
          nullable: true
          minLength: 2
          maxLength: 2
        organization_id:
          type: integer
          nullable: true
        organization:
          allOf:
            - $ref: '#/components/schemas/Organization'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        roles:
          type: array
          items:
            type: string
          description: Rollennamen (z. B. admin, user), wenn mitgeladen

    UserSummary:
      type: object
      description: Reduzierter User in verschachtelten Relationen, z. B. Property-Mitglieder oder Mietvertragsparteien.
      required: [id, name, email]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email

    StoreBankAccountRequest:
      type: object
      description: |
        Erstellt ein Bankkonto. Genau eines von `user_id` oder `organization_id`
        muss gesetzt sein. `iban` und `bic` werden serverseitig ohne Leerzeichen
        und in Grossbuchstaben gespeichert.
      required: [account_holder, iban]
      properties:
        user_id:
          type: integer
          nullable: true
          description: Besitzer als Benutzer; genau eines von `user_id`/`organization_id`.
        organization_id:
          type: integer
          nullable: true
          description: Besitzer als Organisation; genau eines von `user_id`/`organization_id`.
        account_holder:
          type: string
          maxLength: 255
          example: Erika Vermieter
        iban:
          type: string
          maxLength: 34
          pattern: '^[A-Z]{2}[0-9A-Z]{13,32}$'
          example: DE89370400440532013000
        bic:
          type: string
          nullable: true
          maxLength: 11
          pattern: '^[A-Z0-9]{8}([A-Z0-9]{3})?$'
          example: COBADEFFXXX
        bank_name:
          type: string
          nullable: true
          maxLength: 255
        is_default:
          type: boolean
          default: false

    UpdateBankAccountRequest:
      type: object
      description: |
        Aktualisiert ein Bankkonto. Alle Felder sind optional. Wird
        `is_default=true` gesetzt, deaktiviert der Server andere Default-Konten
        desselben Besitzers.
      properties:
        user_id:
          type: integer
          nullable: true
        organization_id:
          type: integer
          nullable: true
        account_holder:
          type: string
          maxLength: 255
        iban:
          type: string
          maxLength: 34
          pattern: '^[A-Z]{2}[0-9A-Z]{13,32}$'
        bic:
          type: string
          nullable: true
          maxLength: 11
          pattern: '^[A-Z0-9]{8}([A-Z0-9]{3})?$'
        bank_name:
          type: string
          nullable: true
          maxLength: 255
        is_default:
          type: boolean

    StoreUserRequest:
      type: object
      description: |
        Ohne Feld `roles` weist das Backend automatisch die Rolle `user` zu.
        Mit `roles` werden die angegebenen Spatie-Rollennamen gesetzt (`syncRoles`);
        dafür ist die Berechtigung `assignRoles` nötig.
      required: [name, email, password, password_confirmation]
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
        phone_number:
          type: string
          nullable: true
          maxLength: 50
        address_street:
          type: string
          nullable: true
          maxLength: 255
        address_house_number:
          type: string
          nullable: true
          maxLength: 20
        address_zip_code:
          type: string
          nullable: true
          maxLength: 20
        address_city:
          type: string
          nullable: true
          maxLength: 255
        address_country:
          type: string
          nullable: true
          minLength: 2
          maxLength: 2
        organization_id:
          type: integer
          nullable: true
          description: Optional; existierende `organizations.id`
        roles:
          type: array
          items:
            type: string
          description: Optional; existierende `roles.name`; erfordert Zuweisungsrecht

    UpdateUserRequest:
      type: object
      description: |
        Alle Felder optional. Bei **Passwortänderung für den eigenen Account** zusätzlich
        `current_password` (aktuelles Passwort) mitsenden. Admins können fremde Passwörter
        ohne `current_password` setzen.
        Feld `roles` setzt Rollen per `syncRoles` (leeres Array entfernt alle Rollen);
        nur mit Berechtigung `assignRoles`, eigene Rollen nicht per API änderbar.
        Feld `organization_id` ist administrative User-Verwaltung und fuer reine
        Profilupdates verboten.
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
        phone_number:
          type: string
          nullable: true
          maxLength: 50
        address_street:
          type: string
          nullable: true
          maxLength: 255
        address_house_number:
          type: string
          nullable: true
          maxLength: 20
        address_zip_code:
          type: string
          nullable: true
          maxLength: 20
        address_city:
          type: string
          nullable: true
          maxLength: 255
        address_country:
          type: string
          nullable: true
          minLength: 2
          maxLength: 2
        organization_id:
          type: integer
          nullable: true
          description: Optional; existierende `organizations.id`; `null` entfernt die Zuordnung; nicht bei reinen Profilupdates erlaubt
        current_password:
          type: string
          description: Erforderlich wenn authentifizierter User sich selbst aktualisiert und `password` gesetzt ist
        roles:
          type: array
          items:
            type: string

    UserPaginator:
      type: object
      description: Laravel paginierte Resource-Collection (data + links + meta)
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        links:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true

    Address:
      type: object
      required: [id, street, house_number, zip_code, city, country, created_at, updated_at]
      properties:
        id:
          type: integer
        street:
          type: string
        house_number:
          type: string
        zip_code:
          type: string
        city:
          type: string
        country:
          type: string
          default: DE
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreAddressRequest:
      type: object
      required: [street, house_number, zip_code, city]
      properties:
        street:
          type: string
          maxLength: 255
        house_number:
          type: string
          maxLength: 20
        zip_code:
          type: string
          maxLength: 20
        city:
          type: string
          maxLength: 255
        country:
          type: string
          minLength: 2
          maxLength: 2
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180

    UpdateAddressRequest:
      type: object
      properties:
        street:
          type: string
          maxLength: 255
        house_number:
          type: string
          maxLength: 20
        zip_code:
          type: string
          maxLength: 20
        city:
          type: string
          maxLength: 255
        country:
          type: string
          minLength: 2
          maxLength: 2
        latitude:
          type: number
          nullable: true
          minimum: -90
          maximum: 90
        longitude:
          type: number
          nullable: true
          minimum: -180
          maximum: 180

    AddressPaginator:
      type: object
      required: [data, links, meta]
      properties:
