        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    patch:
      tags: [Documents]
      summary: Dokumentvorlage aktualisieren
      description: |
        Aktualisiert eine Dokumentvorlage. Aktuell nur fuer `admin`.

        Wenn `content` geaendert und `placeholders` nicht explizit uebergeben
        wird, extrahiert der Server die Platzhalter aus dem neuen Inhalt.
        Unbekannte Platzhalter werden abgelehnt.
      security:
        - sanctumBearer: []
