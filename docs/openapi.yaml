        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Documents]
      summary: Dokument-Metadaten anzeigen
      description: |
        Zeigt ein einzelnes Dokument, wenn der authentifizierte Benutzer das
        verknüpfte Fachobjekt sehen darf. Für Mietvertragsdokumente gilt also
        dieselbe Leseberechtigung wie beim Mietvertrag.

        Für `tenant` ist die Dokument-Sicht zusätzlich an den Dokumentstatus
        gebunden: sichtbar sind nur `shared` und `signed_uploaded`.
      security:
        - sanctumBearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Document'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

