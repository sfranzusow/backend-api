        Objekt als Vermieter verwaltet.

        Statuswechsel sind eingeschränkt:
        - `draft` -> `draft`, `active`
        - `active` -> `active`, `terminated`, `ended`
        - `terminated` -> `terminated`
        - `ended` -> `ended`

        Für `landlord` gilt zusätzlich:
        - `landlord_id` darf nicht auf einen anderen Benutzer geändert werden.
        - `property_id` darf nur auf ein selbst verwaltetes Objekt geändert werden.
      security:
        - sanctumBearer: []
      requestBody:
        content:
          application/json:
