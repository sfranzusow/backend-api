    DocumentActions:
      type: object
      description: |
        Frontend-Hinweise fuer rollen- und workflowabhaengige Dokumentbuttons.
        `true` bedeutet, dass die Aktion fuer den authentifizierten Benutzer
        fachlich angeboten werden kann; der jeweilige Endpunkt prueft weiterhin
        Berechtigung, Status und Dateien serverseitig.
      required: [generate, share, void, download, upload_signed, download_signed, create_reminder]
      properties:
        generate:
          type: boolean
          description: PDF-Snapshot erzeugen oder erneut erzeugen.
        share:
          type: boolean
          description: Erzeugtes Dokument fuer die Gegenseite freigeben.
        void:
          type: boolean
          description: Dokumentakte verwerfen.
        download:
          type: boolean
          description: Erzeugtes PDF herunterladen.
        upload_signed:
          type: boolean
          description: Unterschriebene Datei hochladen.
        download_signed:
          type: boolean
          description: Hochgeladene unterschriebene Datei herunterladen.
        create_reminder:
          type: boolean
          description: Reminder an der Dokumentakte anlegen.

    StoreDocumentTemplateRequest:
      type: object
      description: |
        Erstellt eine Dokumentvorlage. `content` nutzt Platzhalter im Format
        `{{ tenant.name }}`. Wenn `placeholders` fehlt, extrahiert der Server
        die Platzhalter aus `content`.

        Fuer `rental_agreement_contract` sind aktuell nur die im Snapshot
        vorhandenen Pfade erlaubt, z. B. `document.title`, `tenant.name`,
        `landlord.name`, `property.address`, `rental_agreement.rent_cold`
        oder `bank_account.iban`.
      required: [name, document_type]
      properties:
        name:
          type: string
          maxLength: 255
          example: Wohnraummietvertrag Standard
        document_type:
          type: string
          enum: [rental_agreement_contract]
        template_type:
          type: string
          maxLength: 255
          default: default
          example: residential
        locale:
          type: string
          maxLength: 10
          default: de-DE
        version:
          type: integer
          minimum: 1
          default: 1
        status:
          type: string
          enum: [draft, active, archived]
          default: draft
          description: Bei `active` wird die Vorlage nach dem Anlegen aktiviert.
        content:
          type: string
          nullable: true
          example: '<h1>{{ document.title }}</h1><p>Mieter: {{ tenant.name }}</p>'
        placeholders:
          type: array
          nullable: true
          items:
            type: string
          example: [document.title, tenant.name]
        metadata:
          type: object
          nullable: true
          additionalProperties: true

    UpdateDocumentTemplateRequest:
      type: object
      description: |
        Aktualisiert eine Dokumentvorlage. Alle Felder sind optional.
        Unbekannte Platzhalter werden abgelehnt. Die Kombination aus
        `document_type`, `template_type`, `locale` und `version` muss eindeutig
        bleiben.
      properties:
        name:
          type: string
          maxLength: 255
        document_type:
          type: string
          enum: [rental_agreement_contract]
        template_type:
          type: string
          maxLength: 255
        locale:
          type: string
          maxLength: 10
        version:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [draft, active, archived]
          description: Bei `active` wird die Vorlage aktiviert und Konkurrenzvorlagen werden archiviert.
        content:
          type: string
          nullable: true
        placeholders:
          type: array
          nullable: true
          items:
            type: string
        metadata:
          type: object
          nullable: true
          additionalProperties: true

    StoreRentalAgreementDocumentRequest:
      type: object
      description: |
        Erstellt eine Dokumentakte am Mietvertrag. Der Status wird serverseitig
        als `draft` gesetzt. Wenn `document_template_id` gesetzt ist, muss die
        Vorlage denselben `document_type` haben.
      required: [document_type]
      properties:
        document_template_id:
          type: integer
          nullable: true
        document_type:
          type: string
          maxLength: 255
          example: rental_agreement_contract
        title:
          type: string
          maxLength: 255
          nullable: true
          example: Wohnraummietvertrag
        metadata:
          type: object
          nullable: true
          additionalProperties: true

    StoreSignedDocumentUploadRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: PDF, JPG, JPEG oder PNG bis 10 MB.
        metadata:
          type: object
          nullable: true
          additionalProperties: true

    StorePaymentRequest:
      type: object
      required: [type, direction, amount]
      properties:
        type:
          type: string
          enum: [rent, deposit, deposit_refund, service_charge, other]
        direction:
          type: string
          enum: [incoming, outgoing]
          description: |
            Aus Sicht des Vertrags/Vermieters:
            `incoming` = Zahlung Richtung Vermieter,
            `outgoing` = Auszahlung vom Vermieter Richtung Mieter.
        status:
          type: string
          enum: [planned, pending, paid, overdue, cancelled]
          default: pending
        amount:
          type: number
          minimum: 0.01
        currency:
          type: string
          minLength: 3
          maxLength: 3
          description: Fällt ohne Angabe auf die Vertragswährung zurück.
        due_date:
          type: string
          format: date
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
        payer_id:
          type: integer
          nullable: true
          description: Ohne Angabe setzt der Server abhängig von `direction` einen Vertrags-Default.
        payee_id:
          type: integer
          nullable: true
          description: Ohne Angabe setzt der Server abhängig von `direction` einen Vertrags-Default.
        description:
          type: string
          maxLength: 255
          nullable: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true

    UpdatePaymentRequest:
      type: object
      properties:
        type:
          type: string
          enum: [rent, deposit, deposit_refund, service_charge, other]
        direction:
          type: string
          enum: [incoming, outgoing]
        status:
          type: string
          enum: [planned, pending, paid, overdue, cancelled]
        amount:
          type: number
