  /rental-agreements/{rentalAgreement}/payments:
    parameters:
      - name: rentalAgreement
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Payments]
      summary: Zahlungen eines Mietvertrags auflisten
      description: |
        Listet generische Zahlungen zum Mietvertrag. Dazu gehören z. B. Miete,
        Kaution, Kautionsrückzahlung, Nebenkosten oder sonstige Zahlungen.

        `direction` ist aus Sicht des Vertrags/Vermieters definiert:
        `incoming` bedeutet Zahlung Richtung Vermieter, `outgoing` bedeutet
        Auszahlung vom Vermieter Richtung Mieter.
      security:
        - sanctumBearer: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [rent, deposit, deposit_refund, service_charge, other]
        - name: direction
          in: query
          required: false
          schema:
            type: string
            enum: [incoming, outgoing]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [planned, pending, paid, overdue, cancelled]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Payments]
      summary: Zahlung am Mietvertrag anlegen
      description: |
        Erstellt eine Zahlung oder geplante Forderung am Mietvertrag.
        `status` ist optional und wird ohne Angabe als `pending` gesetzt.
        `currency` fällt ohne Angabe auf die Vertragswährung zurück.

        Wenn `payer_id` und `payee_id` nicht übergeben werden, setzt der Server
        sinnvolle Defaults aus dem Mietvertrag:
        Bei `incoming` zahlt der Mieter an den Vermieter.
        Bei `outgoing` zahlt der Vermieter an den Mieter.

        Erlaubt für `admin` oder den zugeordneten `landlord`, der den
        Mietvertrag bearbeiten darf. `tenant` darf Zahlungen lesen, aber nicht
        anlegen oder ändern.
      security:
        - sanctumBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorePaymentRequest'
      responses:
        '201':
          description: Zahlung angelegt
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Payment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

